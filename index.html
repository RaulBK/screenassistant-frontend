<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Cambia a Bankinter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #e63946;
    --accent2: #457b9d;
    --text: #f0f4f8;
    --text-muted: #8899aa;
    --border: #1e2d42;
    --green: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: white; flex-shrink: 0;
  }

  header h1 { font-size: 15px; font-weight: 500; }
  header h1 span { color: var(--text-muted); font-weight: 400; }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
    transition: all 0.3s;
  }

  .status-pill.connected { border-color: var(--green); color: var(--green); }
  .status-pill.speaking  { border-color: var(--accent); color: var(--accent); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-pill.speaking .status-dot { animation: blink 0.8s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Screen panel ── */
  .screen-panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .screen-preview {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #06080f;
    position: relative;
    overflow: hidden;
  }

  #screenVideo {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    display: none;
  }

  .screen-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    color: var(--text-muted);
    user-select: none;
  }

  .screen-placeholder svg { opacity: 0.2; }
  .screen-placeholder p { font-size: 13px; }

  .capture-flash {
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }
  .capture-flash.flash { opacity: 0.15; }

  .screen-toolbar {
    padding: 10px 14px;
    display: flex; gap: 8px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  /* ── Right panel ── */
  .right-panel {
    display: flex; flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  .conversation::-webkit-scrollbar { width: 4px; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; max-width: 92%; }
  .msg.agent { align-self: flex-start; }
  .msg.user  { align-self: flex-end; }
  .msg.system { align-self: center; max-width: 100%; }

  .msg-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-muted); padding: 0 4px;
  }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px; line-height: 1.55;
  }

  .msg.agent .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: var(--accent2);
    border-bottom-right-radius: 4px;
    color: white;
  }

  .msg.system .msg-bubble {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    padding: 6px 12px;
  }

  /* ── Controls ── */
  .controls {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0;
  }

  .voice-bars {
    display: flex; align-items: center;
    justify-content: center; gap: 4px;
    height: 28px;
  }

  .vbar {
    width: 3px; border-radius: 2px;
    background: var(--accent);
    height: 5px;
    transition: height 0.08s;
  }

  .vbar.active { animation: vbar-anim 0.45s ease-in-out infinite alternate; }
  .vbar:nth-child(1){animation-delay:0s}
  .vbar:nth-child(2){animation-delay:.07s}
  .vbar:nth-child(3){animation-delay:.14s}
  .vbar:nth-child(4){animation-delay:.07s}
  .vbar:nth-child(5){animation-delay:0s}

  @keyframes vbar-anim { from{height:4px} to{height:22px} }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  .btn {
    padding: 10px 14px;
    border-radius: 8px; border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center;
    justify-content: center; gap: 7px;
  }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:not(:disabled):hover { background: #c1121f; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:not(:disabled):hover { background: var(--border); }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">B</div>
  <h1>Asistente Cambia a Bankinter <span>· Formación</span></h1>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Desconectado</span>
  </div>
</header>

<div class="main">
  <!-- Screen -->
  <div class="screen-panel">
    <div class="screen-preview">
      <video id="screenVideo" autoplay muted playsinline></video>
      <div class="screen-placeholder" id="screenPlaceholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>Pantalla no compartida</p>
      </div>
      <div class="capture-flash" id="captureFlash"></div>
    </div>
    <div class="screen-toolbar">
      <button class="btn btn-ghost" id="btnShare" onclick="startScreenShare()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
        </svg>
        Compartir pantalla
      </button>
      <button class="btn btn-ghost" id="btnStopShare" onclick="stopScreenShare()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        Detener
      </button>
      <button class="btn btn-ghost" id="btnCapture" onclick="manualCapture()" disabled style="margin-left:auto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Analizar pantalla
      </button>
    </div>
  </div>

  <!-- Conversation + controls -->
  <div class="right-panel">
    <div class="conversation" id="conversation">
      <div class="msg system">
        <div class="msg-bubble">Inicia la sesión de voz para comenzar la formación.</div>
      </div>
    </div>

    <div class="controls">
      <div class="voice-bars" id="voiceBars">
        <div class="vbar" id="vb1"></div>
        <div class="vbar" id="vb2"></div>
        <div class="vbar" id="vb3"></div>
        <div class="vbar" id="vb4"></div>
        <div class="vbar" id="vb5"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnConnect" onclick="connectAgent()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.03 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Iniciar sesión de voz
        </button>
        <button class="btn btn-ghost" id="btnDisconnect" onclick="disconnectAgent()" disabled>
          Colgar
        </button>
      </div>
    </div>
  </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Set this to your Railway backend URL (no trailing slash)
const BACKEND_URL = window.BACKEND_URL || 'https://screenassistant-backend-production.up.railway.app';

// ── STATE ─────────────────────────────────────────────────────────────────────
let screenStream  = null;
let elevenSocket  = null;
let audioCtx      = null;
let isConnected   = false;

// ── SCREEN SHARE ──────────────────────────────────────────────────────────────
async function startScreenShare() {
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5, width: { ideal: 1920 } },
      audio: false
    });
    const video = document.getElementById('screenVideo');
    video.srcObject = screenStream;
    video.style.display = 'block';
    document.getElementById('screenPlaceholder').style.display = 'none';
    document.getElementById('btnShare').disabled     = true;
    document.getElementById('btnStopShare').disabled = false;
    document.getElementById('btnCapture').disabled   = false;
    screenStream.getVideoTracks()[0].onended = stopScreenShare;
    addMsg('system', 'Pantalla compartida. El asistente puede analizarla cuando lo necesite.');
  } catch (e) {
    if (e.name !== 'NotAllowedError') addMsg('system', 'Error al compartir pantalla: ' + e.message);
  }
}

function stopScreenShare() {
  screenStream?.getTracks().forEach(t => t.stop());
  screenStream = null;
  const video = document.getElementById('screenVideo');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('screenPlaceholder').style.display = '';
  document.getElementById('btnShare').disabled     = false;
  document.getElementById('btnStopShare').disabled = true;
  document.getElementById('btnCapture').disabled   = true;
}

// ── CAPTURE + VISION ──────────────────────────────────────────────────────────
function captureFrame() {
  if (!screenStream) return null;
  const video  = document.getElementById('screenVideo');
  const canvas = document.getElementById('captureCanvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  // Flash feedback
  const flash = document.getElementById('captureFlash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 150);

  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

async function analyzeScreen(question) {
  const image = captureFrame();
  if (!image) return null;

  try {
    const r = await fetch(`${BACKEND_URL}/api/vision/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image, question })
    });
    const data = await r.json();
    return data.analysis || null;
  } catch (e) {
    console.error('Vision error:', e);
    return null;
  }
}

async function manualCapture() {
  addMsg('system', '📸 Analizando pantalla...');
  const analysis = await analyzeScreen();
  if (analysis) {
    addMsg('system', `👁 ${analysis}`);
    // If agent is connected, inject as context
    if (elevenSocket?.readyState === WebSocket.OPEN) {
      elevenSocket.send(JSON.stringify({
        type: 'user_message',
        user_message: `[Pantalla actual del gestor: ${analysis}]`
      }));
    }
  }
}

// ── ELEVENLABS ────────────────────────────────────────────────────────────────
async function connectAgent() {
  document.getElementById('btnConnect').disabled = true;

  try {
    const r = await fetch(`${BACKEND_URL}/api/elevenlabs/signed-url`);
    if (!r.ok) throw new Error('No se pudo obtener la URL del agente. Verifica el backend.');
    const { signed_url } = await r.json();

    elevenSocket = new WebSocket(signed_url);

    elevenSocket.onopen = () => {
      isConnected = true;
      setStatus('connected', 'Conectado');
      document.getElementById('btnDisconnect').disabled = false;
      addMsg('system', 'Sesión activa. El asistente está escuchando.');
      startMic();
    };

    elevenSocket.onmessage = async (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'agent_response' && data.agent_response_event?.agent_response) {
        const text = data.agent_response_event.agent_response;
        addMsg('agent', text);
        // Auto-capture if agent references the screen
        if (screenStream && mentionsScreen(text)) {
          const analysis = await analyzeScreen();
          if (analysis && elevenSocket?.readyState === WebSocket.OPEN) {
            elevenSocket.send(JSON.stringify({
              type: 'user_message',
              user_message: `[Pantalla actual: ${analysis}]`
            }));
          }
        }
      }

      if (data.type === 'user_transcript' && data.user_transcription_event?.user_transcript) {
        addMsg('user', data.user_transcription_event.user_transcript);
      }

      if (data.type === 'audio' && data.audio_event?.audio_base64_chunk) {
        playAudio(data.audio_event.audio_base64_chunk);
        setStatus('speaking', 'Hablando');
        setBars(true);
      }

      if (['agent_response_correction','interruption','ping'].includes(data.type)) {
        setStatus('connected', 'Conectado');
        setBars(false);
      }
    };

    elevenSocket.onclose = () => {
      isConnected = false;
      setStatus('', 'Desconectado');
      document.getElementById('btnConnect').disabled    = false;
      document.getElementById('btnDisconnect').disabled = true;
      setBars(false);
      stopMic();
      addMsg('system', 'Sesión finalizada.');
    };

    elevenSocket.onerror = () => {
      addMsg('system', 'Error en la conexión con el agente.');
      document.getElementById('btnConnect').disabled = false;
    };

  } catch (e) {
    addMsg('system', 'Error: ' + e.message);
    document.getElementById('btnConnect').disabled = false;
  }
}

function disconnectAgent() {
  elevenSocket?.close();
}

function mentionsScreen(text) {
  const kw = ['pantalla','ves','veo','muéstrame','captura','screenshot','qué aparece','qué tienes','dónde estás','donde estás'];
  const t = text.toLowerCase();
  return kw.some(k => t.includes(k));
}

// ── MICROPHONE ────────────────────────────────────────────────────────────────
let micProcessor = null;

async function startMic() {
  try {
    audioCtx = new AudioContext({ sampleRate: 16000 });
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const src = audioCtx.createMediaStreamSource(stream);
    micProcessor = audioCtx.createScriptProcessor(4096, 1, 1);

    micProcessor.onaudioprocess = (e) => {
      if (!isConnected || elevenSocket?.readyState !== WebSocket.OPEN) return;
      const pcm = floatToPCM16(e.inputBuffer.getChannelData(0));
      const b64 = btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
      elevenSocket.send(JSON.stringify({ user_audio_chunk: b64 }));
    };

    src.connect(micProcessor);
    micProcessor.connect(audioCtx.destination);
  } catch (e) {
    addMsg('system', 'Sin acceso al micrófono: ' + e.message);
  }
}

function stopMic() {
  audioCtx?.close();
  audioCtx = null;
}

function floatToPCM16(f32) {
  const buf  = new ArrayBuffer(f32.length * 2);
  const view = new DataView(buf);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return view;
}

// ── AUDIO PLAYBACK ────────────────────────────────────────────────────────────
let audioQ = [], playing = false, sharedAudioCtx = null;

function getAudioCtx() {
  if (!sharedAudioCtx || sharedAudioCtx.state === 'closed') {
    sharedAudioCtx = new AudioContext({ sampleRate: 16000 });
  }
  if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
  return sharedAudioCtx;
}

function playAudio(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  audioQ.push(buf.buffer);
  if (!playing) drainQ();
}

async function drainQ() {
  if (!audioQ.length) { playing = false; setBars(false); setStatus('connected','Conectado'); return; }
  playing = true;
  const ctx = getAudioCtx();
  try {
    const decoded = await ctx.decodeAudioData(audioQ.shift());
    const src = ctx.createBufferSource();
    src.buffer = decoded;
    src.connect(ctx.destination);
    src.start();
    src.onended = () => drainQ();
  } catch (e) { console.error('Audio error:', e); drainQ(); }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(cls, label) {
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + cls;
  document.getElementById('statusText').textContent = label;
}

function setBars(active) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById('vb' + i).classList.toggle('active', active);
  }
}

function addMsg(type, text) {
  const conv = document.getElementById('conversation');
  const wrap = document.createElement('div');
  wrap.className = `msg ${type}`;

  if (type !== 'system') {
    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = type === 'agent' ? 'Asistente' : 'Gestor';
    wrap.appendChild(lbl);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  conv.appendChild(wrap);
  conv.scrollTop = conv.scrollHeight;
}
</script>
</body>
</html>
