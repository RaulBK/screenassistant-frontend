<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambia a Bankinter · Formación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    /* Bankinter brand palette */
    --naranja: #FF6600;
    --naranja-dark: #E65200;
    --gris-profundo: #2D2D2D;
    --azul-idea: #0066CC;
    --amarillo: #FFD100;
    --bg: #F7F7F7;
    --surface: #FFFFFF;
    --surface2: #F0F1F2;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --border: #E2E2E2;
    --green: #1C9D5C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    background: var(--gris-profundo);
    flex-shrink: 0;
  }

  .logo-mark {
    width: 34px; height: 34px;
    background: var(--naranja);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: white; flex-shrink: 0;
    letter-spacing: -0.5px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: white;
    letter-spacing: -0.1px;
  }
  header h1 span { color: #B5B5B5; font-weight: 400; }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 500;
    color: #B5B5B5;
    transition: all 0.3s;
  }

  .status-pill.connected { border-color: var(--green); color: var(--green); background: rgba(28,157,92,0.1); }
  .status-pill.speaking  { border-color: var(--naranja); color: var(--naranja); background: rgba(255,102,0,0.1); }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .status-pill.speaking .status-dot { animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Screen panel ── */
  .screen-panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    background: var(--surface);
  }

  .screen-preview {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--gris-profundo);
    position: relative;
    overflow: hidden;
  }

  #screenVideo { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; display: none; }

  .screen-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
    color: #8A8A8A;
    user-select: none;
  }
  .screen-placeholder svg { opacity: 0.35; color: var(--naranja); }
  .screen-placeholder p { font-size: 13px; font-weight: 500; }

  .capture-flash {
    position: absolute; inset: 0;
    background: var(--naranja);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
  }
  .capture-flash.flash { opacity: 0.2; }

  .screen-toolbar {
    padding: 12px 16px;
    display: flex; gap: 10px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  /* ── Right panel ── */
  .right-panel {
    display: flex; flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex; flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  .conversation::-webkit-scrollbar { width: 4px; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 90%; }
  .msg.agent { align-self: flex-start; }
  .msg.user  { align-self: flex-end; }
  .msg.system { align-self: center; max-width: 100%; }

  .msg-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--text-muted); padding: 0 4px;
  }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
  }

  .msg.agent .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--naranja);
    border-bottom-right-radius: 4px;
    color: white;
    font-weight: 500;
  }

  .msg.system .msg-bubble {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    font-size: 11.5px;
    text-align: center;
    padding: 7px 14px;
  }

  /* ── Controls ── */
  .controls {
    padding: 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 12px;
    flex-shrink: 0;
    background: var(--surface2);
  }

  .voice-bars { display: flex; align-items: center; justify-content: center; gap: 4px; height: 28px; }
  .vbar { width: 3px; border-radius: 2px; background: var(--naranja); height: 5px; }
  .vbar.active { animation: vbar-anim 0.45s ease-in-out infinite alternate; }
  .vbar:nth-child(1){animation-delay:0s} .vbar:nth-child(2){animation-delay:.07s} .vbar:nth-child(3){animation-delay:.14s} .vbar:nth-child(4){animation-delay:.07s} .vbar:nth-child(5){animation-delay:0s}
  @keyframes vbar-anim { from{height:4px} to{height:22px} }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  .btn {
    padding: 11px 16px;
    border-radius: 8px; border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--naranja); color: white; }
  .btn-primary:not(:disabled):hover { background: var(--naranja-dark); }

  .btn-ghost {
    background: var(--surface);
    color: var(--gris-profundo);
    border: 1px solid var(--border);
  }
  .btn-ghost:not(:disabled):hover { background: var(--bg); border-color: var(--naranja); }

  .chat-input-row { display: flex; gap: 8px; }
  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 13px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--naranja); }
  .chat-input::placeholder { color: var(--text-muted); opacity: 0.7; }
  .chat-input:disabled { opacity: 0.4; }

  .btn-send {
    padding: 10px 15px;
    border-radius: 8px; border: none;
    background: var(--azul-idea);
    color: white;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: #0052A3; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">B</div>
  <h1>Cambia a Bankinter <span>· Formación de gestores</span></h1>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Desconectado</span>
  </div>
</header>

<div class="main">
  <div class="screen-panel">
    <div class="screen-preview">
      <video id="screenVideo" autoplay muted playsinline></video>
      <div class="screen-placeholder" id="screenPlaceholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>Pantalla no compartida</p>
      </div>
      <div class="capture-flash" id="captureFlash"></div>
    </div>
    <div class="screen-toolbar">
      <button class="btn btn-ghost" id="btnShare" onclick="startScreenShare()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
        </svg>
        Compartir pantalla
      </button>
      <button class="btn btn-ghost" id="btnStopShare" onclick="stopScreenShare()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        Detener
      </button>
      <button class="btn btn-ghost" id="btnCapture" onclick="manualCapture()" disabled style="margin-left:auto">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Analizar pantalla
      </button>
    </div>
  </div>

  <div class="right-panel">
    <div class="conversation" id="conversation">
      <div class="msg system">
        <div class="msg-bubble">Inicia la sesión de voz para comenzar la formación.</div>
      </div>
    </div>
    <div class="controls">
      <div class="voice-bars" id="voiceBars">
        <div class="vbar" id="vb1"></div>
        <div class="vbar" id="vb2"></div>
        <div class="vbar" id="vb3"></div>
        <div class="vbar" id="vb4"></div>
        <div class="vbar" id="vb5"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnConnect" onclick="connectAgent()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.03 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Iniciar sesión de voz
        </button>
        <button class="btn btn-ghost" id="btnDisconnect" onclick="disconnectAgent()" disabled>
          Colgar
        </button>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" type="text" placeholder="Escribe un mensaje..." disabled onkeydown="handleChatKey(event)" />
        <button class="btn-send" id="btnSend" onclick="sendChatMessage()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
var BACKEND_URL = 'https://screenassistant-backend-production.up.railway.app';

var screenStream = null;
var elevenSocket = null;
var micAudioCtx  = null;
var isConnected  = false;
var playCtx      = null;

// ── SCREEN SHARE ──────────────────────────────────────────────────────────────
async function startScreenShare() {
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5, width: { ideal: 1920 } },
      audio: false
    });
    var video = document.getElementById('screenVideo');
    video.srcObject = screenStream;
    video.style.display = 'block';
    document.getElementById('screenPlaceholder').style.display = 'none';
    document.getElementById('btnShare').disabled     = true;
    document.getElementById('btnStopShare').disabled = false;
    document.getElementById('btnCapture').disabled   = false;
    screenStream.getVideoTracks()[0].onended = stopScreenShare;
    addMsg('system', 'Pantalla compartida. El asistente puede analizarla cuando lo necesite.');
  } catch (e) {
    if (e.name !== 'NotAllowedError') addMsg('system', 'Error al compartir pantalla: ' + e.message);
  }
}

function stopScreenShare() {
  if (screenStream) screenStream.getTracks().forEach(function(t) { t.stop(); });
  screenStream = null;
  var video = document.getElementById('screenVideo');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('screenPlaceholder').style.display = '';
  document.getElementById('btnShare').disabled     = false;
  document.getElementById('btnStopShare').disabled = true;
  document.getElementById('btnCapture').disabled   = true;
}

// ── CAPTURE + VISION ──────────────────────────────────────────────────────────
function captureFrame() {
  if (!screenStream) return null;
  var video  = document.getElementById('screenVideo');
  var canvas = document.getElementById('captureCanvas');
  var w = video.videoWidth;
  var h = video.videoHeight;
  if (!w || !h) return null;
  if (w > 1280) { h = Math.round(h * 1280 / w); w = 1280; }
  canvas.width  = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.6);
  if (!dataUrl || dataUrl === 'data:,') return null;
  var flash = document.getElementById('captureFlash');
  flash.classList.add('flash');
  setTimeout(function() { flash.classList.remove('flash'); }, 150);
  return dataUrl.split(',')[1];
}

async function analyzeScreen(question) {
  var image = captureFrame();
  if (!image) return null;
  try {
    var r = await fetch(BACKEND_URL + '/api/vision/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: image, question: question })
    });
    var data = await r.json();
    return data.analysis || null;
  } catch (e) {
    console.error('Vision error:', e);
    return null;
  }
}

async function manualCapture() {
  addMsg('system', 'Analizando pantalla...');
  var analysis = await analyzeScreen();
  if (analysis) addMsg('system', analysis);
  else addMsg('system', 'No se pudo capturar la pantalla.');
}

// ── CHAT INPUT ────────────────────────────────────────────────────────────────
function handleChatKey(e) {
  if (e.key === 'Enter') sendChatMessage();
}

function sendChatMessage() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text || !elevenSocket || elevenSocket.readyState !== WebSocket.OPEN) return;
  addMsg('user', text);
  elevenSocket.send(JSON.stringify({ type: 'user_message', user_message: text }));
  input.value = '';
}

// ── ELEVENLABS ────────────────────────────────────────────────────────────────
async function connectAgent() {
  if (!playCtx || playCtx.state === 'closed') playCtx = new AudioContext();
  if (playCtx.state === 'suspended') await playCtx.resume();

  document.getElementById('btnConnect').disabled = true;
  try {
    var r = await fetch(BACKEND_URL + '/api/elevenlabs/signed-url');
    if (!r.ok) throw new Error('No se pudo obtener la URL del agente.');
    var json = await r.json();
    elevenSocket = new WebSocket(json.signed_url);

    elevenSocket.onopen = function() {
      isConnected = true;
      setStatus('connected', 'Conectado');
      document.getElementById('btnDisconnect').disabled = false;
      document.getElementById('chatInput').disabled     = false;
      document.getElementById('btnSend').disabled       = false;
      addMsg('system', 'Sesión activa. El asistente está escuchando.');
      startMic();
    };

    elevenSocket.onmessage = async function(event) {
      var data = JSON.parse(event.data);

      if (data.type === 'agent_response' && data.agent_response_event && data.agent_response_event.agent_response) {
        addMsg('agent', data.agent_response_event.agent_response);
      }

      if (data.type === 'user_transcript' && data.user_transcription_event && data.user_transcription_event.user_transcript) {
        addMsg('user', data.user_transcription_event.user_transcript);
      }

      if (data.type === 'audio' && data.audio_event) {
        var b64 = data.audio_event.audio_base64_chunk || data.audio_event.audio_base_64;
        if (b64) {
          playPCMChunk(b64);
          setStatus('speaking', 'Hablando');
          setBars(true);
        }
      }

      if (data.type === 'agent_response_correction' || data.type === 'interruption' || data.type === 'ping') {
        setStatus('connected', 'Conectado');
        setBars(false);
      }

      if (data.type === 'client_tool_call' && data.client_tool_call && data.client_tool_call.tool_name === 'analyze_screen') {
        var toolCallId = data.client_tool_call.tool_call_id;
        addMsg('system', 'Analizando pantalla...');
        var analysis = await analyzeScreen();
        var result = analysis || 'No hay pantalla compartida o no se pudo capturar.';
        addMsg('system', result);
        if (elevenSocket && elevenSocket.readyState === WebSocket.OPEN) {
          elevenSocket.send(JSON.stringify({
            type: 'client_tool_result',
            tool_call_id: toolCallId,
            result: result,
            is_error: false
          }));
        }
      }
    };

    elevenSocket.onclose = function() {
      isConnected = false;
      setStatus('', 'Desconectado');
      document.getElementById('btnConnect').disabled    = false;
      document.getElementById('btnDisconnect').disabled = true;
      document.getElementById('chatInput').disabled     = true;
      document.getElementById('btnSend').disabled       = true;
      setBars(false);
      stopMic();
      addMsg('system', 'Sesión finalizada.');
    };

    elevenSocket.onerror = function() {
      addMsg('system', 'Error en la conexión con el agente.');
      document.getElementById('btnConnect').disabled = false;
    };

  } catch (e) {
    addMsg('system', 'Error: ' + e.message);
    document.getElementById('btnConnect').disabled = false;
  }
}

function disconnectAgent() {
  if (elevenSocket) elevenSocket.close();
}

// ── MICROPHONE ────────────────────────────────────────────────────────────────
async function startMic() {
  try {
    micAudioCtx = new AudioContext({ sampleRate: 16000 });
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    var src = micAudioCtx.createMediaStreamSource(stream);
    var processor = micAudioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = function(e) {
      if (!isConnected || !elevenSocket || elevenSocket.readyState !== WebSocket.OPEN) return;
      var pcm = floatToPCM16(e.inputBuffer.getChannelData(0));
      var bytes = new Uint8Array(pcm.buffer);
      var binary = '';
      for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      elevenSocket.send(JSON.stringify({
        type: 'user_audio_chunk',
        user_audio_chunk: btoa(binary)
      }));
    };

    src.connect(processor);
    var silentGain = micAudioCtx.createGain();
    silentGain.gain.value = 0;
    processor.connect(silentGain);
    silentGain.connect(micAudioCtx.destination);
  } catch (e) {
    addMsg('system', 'Sin acceso al micrófono: ' + e.message);
  }
}

function stopMic() {
  if (micAudioCtx) { micAudioCtx.close(); micAudioCtx = null; }
}

function floatToPCM16(f32) {
  var buf  = new ArrayBuffer(f32.length * 2);
  var view = new DataView(buf);
  for (var i = 0; i < f32.length; i++) {
    var s = Math.max(-1, Math.min(1, f32[i]));
    view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return view;
}

// ── AUDIO PLAYBACK ────────────────────────────────────────────────────────────
var audioQ  = [];
var playing = false;

function getPlayCtx() {
  if (!playCtx || playCtx.state === 'closed') playCtx = new AudioContext();
  if (playCtx.state === 'suspended') playCtx.resume();
  return playCtx;
}

function playPCMChunk(b64) {
  var bin = atob(b64);
  var samples = bin.length / 2;
  var ctx = getPlayCtx();
  var audioBuf = ctx.createBuffer(1, samples, 16000);
  var channel = audioBuf.getChannelData(0);
  var view = new DataView(new ArrayBuffer(bin.length));
  for (var i = 0; i < bin.length; i++) view.setUint8(i, bin.charCodeAt(i));
  for (var i = 0; i < samples; i++) {
    channel[i] = view.getInt16(i * 2, true) / 32768.0;
  }
  audioQ.push(audioBuf);
  if (!playing) drainQ();
}

function drainQ() {
  if (!audioQ.length) { playing = false; setBars(false); setStatus('connected', 'Conectado'); return; }
  playing = true;
  var ctx = getPlayCtx();
  var audioBuf = audioQ.shift();
  var src = ctx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(ctx.destination);
  src.start();
  src.onended = drainQ;
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(cls, label) {
  document.getElementById('statusPill').className = 'status-pill ' + cls;
  document.getElementById('statusText').textContent = label;
}

function setBars(active) {
  for (var i = 1; i <= 5; i++) {
    var bar = document.getElementById('vb' + i);
    if (active) bar.classList.add('active');
    else bar.classList.remove('active');
  }
}

function addMsg(type, text) {
  var conv = document.getElementById('conversation');
  var wrap = document.createElement('div');
  wrap.className = 'msg ' + type;
  if (type !== 'system') {
    var lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = type === 'agent' ? 'Asistente' : 'Gestor';
    wrap.appendChild(lbl);
  }
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  conv.appendChild(wrap);
  conv.scrollTop = conv.scrollHeight;
}
</script>
</body>
</html>
